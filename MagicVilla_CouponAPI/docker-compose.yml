version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=@rubenz123
    ports:
      - "1433:1433"
    networks:
      - backend-net

  minimalapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magicvilla_couponapi
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=Northwind;User Id=sa;Password=@rubenz123;TrustServerCertificate=true;
    ports:
      - "5000:80"
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge
